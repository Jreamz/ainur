{{define "search-results"}}
<table class="striped">
    <thead>
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Groups</th>
        <th>Roles</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    {{range .}}
    <tr>
        <td>{{.Name}}</td>
        <td>{{.Email}}</td>
        <td>
            {{range .GroupsObj}}
            {{.Name}}
            {{else}}
            None
            {{end}}
        </td>
        <td>
            {{range .RolesObj}}
            {{.Name}}
            {{else}}
            None
            {{end}}
        </td>
        <td>
            <div role="group">
            <button class="primary outline"
                    hx-post="/users/{{.Pk}}/reset-password"
                    hx-target="#result"
                    hx-swap="innerHTML"
                    hx-confirm="Reset password for {{.Name}}?"
                    data-tooltip="Reset Password"
            >R</button>
            <button class="primary outline"
                    hx-post="/users/{{.Pk}}/update-user"
                    hx-target="#result"
                    hx-swap="innerHTML"
                    hx-confirm="Update user for {{.Name}}?"
                    data-tooltip="Update User"
            >U</button>
            <button class="primary outline"
                    hx-post="/users/{{.Pk}}/update-user"
                    hx-target="#result"
                    hx-swap="innerHTML"
                    hx-confirm="Update user for {{.Name}}?"
                    data-tooltip="Generate Password Link"
            >G</button>
            <button class="primary outline"
                    hx-delete="/users/{{.Pk}}"
                    hx-target="#result"
                    hx-swap="innerHTML"
                    hx-confirm="Delete {{.Pk}}?"
                    data-tooltip="Delete User"
            >D</button>
            </div>
        </td>
    </tr>
    {{end}}
    </tbody>
</table>
{{end}}
